name: NZU Ops Freshness Check

on:
  schedule:
    # 07:30 KST daily (UTC+9 => previous day 22:30 UTC)
    # Keep enough gap because the ops pipeline can run ~40-60 minutes.
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nzu-ops-freshness-check
  cancel-in-progress: false

jobs:
  freshness-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      OPS_DISCORD_WEBHOOK_URL: ${{ secrets.OPS_DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Write .env.local for scripts
        run: |
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
            echo "OPS_DISCORD_WEBHOOK_URL=${OPS_DISCORD_WEBHOOK_URL}"
          } > .env.local

      - name: Run freshness check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/tools/check-ops-github-actions-freshness.js
