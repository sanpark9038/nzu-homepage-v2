name: NZU Ops Pipeline Debug Chunk1

on:
  workflow_dispatch:

concurrency:
  group: nzu-ops-pipeline-debug-chunk1
  cancel-in-progress: false

jobs:
  debug_chunk1:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      OPS_DISCORD_WEBHOOK_URL: ${{ secrets.OPS_DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore pipeline state cache
        uses: actions/cache/restore@v4
        with:
          path: |
            tmp/
            data/metadata/projects/
          key: pipeline-state-${{ runner.os }}-v2-${{ github.run_id }}
          restore-keys: |
            pipeline-state-${{ runner.os }}-v2-

      - name: Run chunk1 teams via ops pipeline path
        run: |
          node scripts/tools/run-ops-pipeline.js \
            --skip-supabase \
            --no-discord \
            --teams bgm,black,c9 \
            --inactive-skip-days 14 \
            --no-roster-sync \
            --no-display-alias \
            --no-team-table \
            --no-organize

      - name: Print pipeline status
        if: always()
        run: npm run pipeline:status || true

      - name: Send Discord summary
        if: always()
        env:
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            node scripts/tools/send-manual-refresh-discord.js --outcome success --source github-actions-debug --run-url "$GH_RUN_URL"
          else
            node scripts/tools/send-manual-refresh-discord.js --outcome failure --source github-actions-debug --run-url "$GH_RUN_URL"
          fi

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug-chunk1-${{ github.run_id }}
          path: |
            tmp/reports/
            tmp/*.json
            tmp/exports/
          if-no-files-found: warn
          retention-days: 14
