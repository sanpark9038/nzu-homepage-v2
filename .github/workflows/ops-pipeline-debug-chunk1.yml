name: NZU Ops Pipeline Debug Chunk1

on:
  workflow_dispatch:

concurrency:
  group: nzu-ops-pipeline-debug-chunk1
  cancel-in-progress: false

jobs:
  debug_chunk1:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore pipeline state cache
        uses: actions/cache/restore@v4
        with:
          path: |
            tmp/
            data/metadata/
          key: pipeline-state-${{ runner.os }}-v1-${{ github.run_id }}
          restore-keys: |
            pipeline-state-${{ runner.os }}-v1-

      - name: Run chunk1 teams without strict
        run: |
          node scripts/tools/run-daily-pipeline.js \
            --teams bgm,black,c9 \
            --inactive-skip-days 14 \
            --no-strict \
            --no-team-table \
            --no-organize

      - name: Print pipeline status
        if: always()
        run: npm run pipeline:status || true

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug-chunk1-${{ github.run_id }}
          path: |
            tmp/reports/
            tmp/*.json
            tmp/exports/
          if-no-files-found: warn
          retention-days: 14
