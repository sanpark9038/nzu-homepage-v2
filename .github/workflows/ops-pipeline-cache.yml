name: NZU Ops Pipeline

on:
  workflow_dispatch:
    inputs:
      with_supabase_sync:
        description: "Enable Supabase push after collection"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "10 21 * * *"

concurrency:
  group: nzu-ops-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      OPS_DISCORD_WEBHOOK_URL: ${{ secrets.OPS_DISCORD_WEBHOOK_URL }}
      SERVING_REVALIDATE_SECRET: ${{ secrets.SERVING_REVALIDATE_SECRET }}
      SERVING_REVALIDATE_URL: ${{ vars.SERVING_REVALIDATE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daily pipeline regression tests
        run: npm run test:pipeline:daily

      - name: Validate pipeline alert rules
        run: npm run validate:pipeline-alert-rules

      - name: Restore pipeline state cache
        id: pipeline-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            tmp/
          key: pipeline-state-${{ runner.os }}-v4-${{ github.run_id }}
          restore-keys: |
            pipeline-state-${{ runner.os }}-v4-

      - name: Determine workflow mode
        id: workflow_mode
        shell: bash
        run: |
          run_command="npm run pipeline:manual:refresh"
          mode_label="collect-only"
          sync_warning=""
          sync_requested="false"
          sync_enabled="false"
          has_supabase_secrets="false"

          if [ -n "${NEXT_PUBLIC_SUPABASE_URL}" ] && { [ -n "${SUPABASE_SERVICE_ROLE_KEY}" ] || [ -n "${SUPABASE_SERVICE_KEY}" ]; }; then
            has_supabase_secrets="true"
          fi

          if [ "${{ github.event_name }}" = "schedule" ]; then
            sync_requested="true"
            if [ "$has_supabase_secrets" = "true" ]; then
              run_command="npm run pipeline:manual:refresh:with-sync"
              mode_label="scheduled auto-sync"
              sync_enabled="true"
            else
              mode_label="scheduled auto-sync unavailable, downgraded to collect-only"
              sync_warning="Supabase service-role secret is not configured in GitHub Actions, so homepage serving sync was skipped."
            fi
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.with_supabase_sync }}" = "true" ]; then
            sync_requested="true"
            if [ "$has_supabase_secrets" = "true" ]; then
              run_command="npm run pipeline:manual:refresh:with-sync"
              mode_label="manual dispatch with Supabase sync"
              sync_enabled="true"
            else
              mode_label="manual dispatch requested sync, downgraded to collect-only"
              sync_warning="Supabase service-role secret is not configured in GitHub Actions, so sync was skipped."
            fi
          fi

          {
            echo "run_command=$run_command"
            echo "mode_label=$mode_label"
            echo "sync_requested=$sync_requested"
            echo "sync_enabled=$sync_enabled"
            echo "sync_warning=$sync_warning"
            echo "has_supabase_secrets=$has_supabase_secrets"
          } >> "$GITHUB_OUTPUT"

      - name: Run manual refresh
        id: manual_refresh
        shell: bash
        env:
          WORKFLOW_SYNC_REQUESTED: ${{ steps.workflow_mode.outputs.sync_requested }}
          WORKFLOW_SYNC_ENABLED: ${{ steps.workflow_mode.outputs.sync_enabled }}
          WORKFLOW_SYNC_WARNING: ${{ steps.workflow_mode.outputs.sync_warning }}
        run: ${{ steps.workflow_mode.outputs.run_command }}

      - name: Check collection sources health
        if: always()
        continue-on-error: true
        run: npm run pipeline:collection-sources:health -- --write

      - name: Print pipeline status
        if: always()
        run: npm run pipeline:status

      - name: Send Discord summary
        if: always()
        env:
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_MODE_LABEL: ${{ steps.workflow_mode.outputs.mode_label }}
          WORKFLOW_SYNC_WARNING: ${{ steps.workflow_mode.outputs.sync_warning }}
        run: |
          if [ "${{ steps.manual_refresh.outcome }}" = "success" ]; then
            node scripts/tools/send-manual-refresh-discord.js --outcome success --source github-actions --run-url "$GH_RUN_URL"
          else
            node scripts/tools/send-manual-refresh-discord.js --outcome failure --source github-actions --run-url "$GH_RUN_URL"
          fi

      - name: Write Discord summary check
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          echo "- Workflow Mode: ${{ steps.workflow_mode.outputs.mode_label }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.workflow_mode.outputs.sync_warning }}" ]; then
            echo "- Sync Warning: ${{ steps.workflow_mode.outputs.sync_warning }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f tmp/reports/pipeline_collection_sources_health_latest.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat tmp/reports/pipeline_collection_sources_health_latest.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          npm run pipeline:verify:discord -- --markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-reports-${{ github.run_id }}
          path: |
            tmp/reports/*latest.json
            tmp/reports/*latest.md
            tmp/reports/homepage_integrity_report.json
            tmp/reports/team_roster_sync_report.json
            tmp/reports/team_auto_discovery_report.json
            tmp/reports/manual_refresh_baseline.json
            tmp/reports/pipeline_collection_sources_health_latest.json
            tmp/reports/pipeline_collection_sources_health_latest.md
          if-no-files-found: warn
          retention-days: 14

      - name: Save pipeline state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            tmp/
          key: pipeline-state-${{ runner.os }}-v4-${{ github.run_id }}
