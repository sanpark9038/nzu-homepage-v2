name: NZU Ops Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "10 21 * * *"

concurrency:
  group: nzu-ops-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      OPS_DISCORD_WEBHOOK_URL: ${{ secrets.OPS_DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daily pipeline regression tests
        run: npm run test:pipeline:daily

      - name: Restore pipeline state cache
        id: pipeline-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            tmp/
            data/metadata/projects/
          key: pipeline-state-${{ runner.os }}-v2-${{ github.run_id }}
          restore-keys: |
            pipeline-state-${{ runner.os }}-v2-

      - name: Run manual refresh
        id: manual_refresh
        run: npm run pipeline:manual:refresh

      - name: Print pipeline status
        if: always()
        run: npm run pipeline:status

      - name: Send Discord summary
        if: always()
        env:
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${{ steps.manual_refresh.outcome }}" = "success" ]; then
            node scripts/tools/send-manual-refresh-discord.js --outcome success --source github-actions --run-url "$GH_RUN_URL"
          else
            node scripts/tools/send-manual-refresh-discord.js --outcome failure --source github-actions --run-url "$GH_RUN_URL"
          fi

      - name: Write Discord summary check
        if: always()
        continue-on-error: true
        run: npm run pipeline:verify:discord -- --markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-reports-${{ github.run_id }}
          path: |
            tmp/reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Save pipeline state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            tmp/
            data/metadata/projects/
          key: pipeline-state-${{ runner.os }}-v2-${{ github.run_id }}
