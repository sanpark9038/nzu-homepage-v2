name: NZU Ops Pipeline

on:
  schedule:
    # 06:10 KST daily (UTC+9 => previous day 21:10 UTC)
    - cron: "10 21 * * *"
  workflow_dispatch:
    inputs:
      skip_supabase:
        description: "Skip Supabase sync steps"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Dry run (no actual pipeline execution)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: nzu-ops-pipeline
  cancel-in-progress: false

jobs:
  run-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      OPS_DISCORD_WEBHOOK_URL: ${{ secrets.OPS_DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Write .env.local for scripts
        run: |
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
            echo "OPS_DISCORD_WEBHOOK_URL=${OPS_DISCORD_WEBHOOK_URL}"
          } > .env.local

      - name: Run ops pipeline
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_supabase }}" = "true" ]; then
            ARGS="$ARGS --skip-supabase"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/tools/run-ops-pipeline.js $ARGS

