name: SOOP Live Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: soop-live-sync
  cancel-in-progress: true

jobs:
  sync-live-state:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SOOP_CLIENT_ID: ${{ secrets.SOOP_CLIENT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate SOOP live snapshot
        run: npm run soop:snapshot:generate

      - name: Sync live state to Supabase
        run: npm run soop:snapshot:sync:supabase

      - name: Verify homepage integrity
        run: npm run report:homepage:integrity

      - name: Write workflow summary
        if: always()
        run: |
          echo "## SOOP Live Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Schedule: every 5 minutes" >> "$GITHUB_STEP_SUMMARY"
          echo "- Snapshot generator: \`npm run soop:snapshot:generate\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Supabase live sync: \`npm run soop:snapshot:sync:supabase\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          node scripts/tools/report-soop-live-summary.js >> "$GITHUB_STEP_SUMMARY"

      - name: Upload live-sync reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soop-live-sync-${{ github.run_id }}
          path: |
            tmp/reports/homepage_integrity_report.json
            data/metadata/soop_live_snapshot.generated.v1.json
          if-no-files-found: warn
          retention-days: 7
