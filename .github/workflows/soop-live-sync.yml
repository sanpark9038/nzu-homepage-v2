name: SOOP Live Sync

on:
  workflow_dispatch:

concurrency:
  group: soop-live-sync
  cancel-in-progress: true

jobs:
  sync-live-state:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SOOP_SYNC_SECRET: ${{ secrets.SOOP_SYNC_SECRET }}

    steps:
      - name: Call SOOP live Edge Function
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NEXT_PUBLIC_SUPABASE_URL}" ]; then
            echo "NEXT_PUBLIC_SUPABASE_URL is required." >&2
            exit 1
          fi

          if [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY is required." >&2
            exit 1
          fi

          if [ -z "${SOOP_SYNC_SECRET}" ]; then
            echo "SOOP_SYNC_SECRET is required." >&2
            exit 1
          fi

          endpoint="${NEXT_PUBLIC_SUPABASE_URL%/}/functions/v1/soop-live-sync"
          response="$(
            curl --fail-with-body -sS -X POST "$endpoint" \
              -H "authorization: Bearer ${NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
              -H "apikey: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
              -H "x-sync-secret: ${SOOP_SYNC_SECRET}" \
              -H "content-type: application/json" \
              --data '{"source":"github-actions-workflow-dispatch"}'
          )"

          echo "$response"
          {
            echo "## SOOP Live Sync"
            echo ""
            echo "- Trigger: manual fallback"
            echo "- Endpoint: \`/functions/v1/soop-live-sync\`"
            echo "- Response: \`$response\`"
          } >> "$GITHUB_STEP_SUMMARY"
